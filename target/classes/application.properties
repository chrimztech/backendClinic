spring.application.name=unza-clinic-backend
server.port=${SERVER_PORT:8080}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/unza_hospital}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:11111111}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}

app.jwt.secret=${UNZA_JWT_SECRET:unza-clinic-secret-key-change-in-production-2026}
app.jwt.expiration=${UNZA_JWT_EXPIRATION:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost:3000,http://localhost:3001,http://localhost:8081,http://127.0.0.1:8081}
spring.main.allow-circular-references=true

# File & document storage (Feature 2)
app.documents.storage-path=${APP_DOCUMENTS_STORAGE_PATH:./clinic-documents}

# Short-lived access token: 15 minutes (Feature 8)
app.jwt.access-expiration=${UNZA_JWT_ACCESS_EXPIRATION:900000}

# Refresh token TTL in days (Feature 8)
app.refresh-token.ttl-days=${APP_REFRESH_TOKEN_TTL_DAYS:7}

# Vital alert scanning interval in ms — 5 minutes (Feature 5)
app.vital-alerts.check-interval-ms=${APP_VITAL_ALERTS_INTERVAL_MS:300000}

# Mail (Feature notifications — configure in prod)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}

# Multipart file upload limits (Feature 2)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Pharmacy alert scheduler interval — 6 hours (item 2)
app.pharmacy-alerts.check-interval-ms=${APP_PHARMACY_ALERTS_INTERVAL_MS:21600000}

# Login rate limiting (item 4)
app.login.max-attempts=${APP_LOGIN_MAX_ATTEMPTS:5}
app.login.window-seconds=${APP_LOGIN_WINDOW_SECONDS:60}

# Counseling system integration (counselling.unza.ac.zm)
app.counseling.base-url=${COUNSELING_SYSTEM_URL:https://counselling.unza.ac.zm}
# Service-account credentials for the counseling system (ROLE_COUNSELOR account)
# The clinic backend logs in automatically and refreshes the token every 55 minutes
app.counseling.service-username=${COUNSELING_SERVICE_USERNAME:}
app.counseling.service-password=${COUNSELING_SERVICE_PASSWORD:}
# Optional: static override token (skips auto-login when set)
app.counseling.service-token=${COUNSELING_SERVICE_TOKEN:}
