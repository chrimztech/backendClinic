server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: unza-clinic-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/unza_hospital
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:11111111}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
          order_inserts: true
          order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.unza.clinic: INFO
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
  file:
    name: logs/unza-clinic.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  jwt:
    secret: ${UNZA_JWT_SECRET:CHANGE_THIS_TO_A_LONG_RANDOM_SECRET}
    expiration: ${UNZA_JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://clinic.unza.ac.zm}
  # UNZA HR system (staff & dependents metadata) — set via .env.backend / container env.
  # Left blank-safe: lookups gracefully no-op if unconfigured or unreachable.
  hr:
    base-url: ${HR_SYSTEM_URL:https://hr.unza.zm}
    service-username: ${HR_SERVICE_USERNAME:}
    service-password: ${HR_SERVICE_PASSWORD:}
    service-token: ${HR_SERVICE_TOKEN:}
  # UNZA student records system (devoap.unza.zm) — single static Bearer token, no login flow.
  sis:
    base-url: ${SIS_SYSTEM_URL:}
    token: ${SIS_SERVICE_TOKEN:}
  # Counseling system — same pattern.
  counseling:
    base-url: ${COUNSELING_SYSTEM_URL:}
    service-username: ${COUNSELING_SERVICE_USERNAME:}
    service-password: ${COUNSELING_SERVICE_PASSWORD:}
    service-token: ${COUNSELING_SERVICE_TOKEN:}
